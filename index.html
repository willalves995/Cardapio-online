<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xis Raiz - Cardápio Digital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🍔 XIS RAIZ - Sabor de Verdade</h1>

<div class="cardapio">

  <input type="text" id="nome" placeholder="Seu nome">
  <input type="text" id="endereco" placeholder="Seu endereço">

  <select id="pagamento">
    <option value="">Forma de pagamento</option>
    <option value="Dinheiro">Dinheiro</option>
    <option value="Pix">Pix</option>
    <option value="Cartão">Cartão</option>
  </select>

  <div class="item">
    <img src="imagens/X-Salada.jpg">
    <div class="info">
      <span>X Salada - R$ 22.00</span>
      <input type="number" min="0" value="0"
             data-name="X Salada"
             data-price="22.00">
    </div>
  </div>

  <div class="item">
    <img src="imagens/X-Frango.jpg">
    <div class="info">
      <span>X Frango - R$ 24.00</span>
      <input type="number" min="0" value="0"
             data-name="X Frango"
             data-price="24.00">
    </div>
  </div>

  <div class="item">
  <img src="imagens/X-Calabresa.jpg">
  <div class="info">
    <span>X Calabresa - R$ 26.00</span>
    <input type="number" min="0" value="0"
           data-name="X Calabresa"
           data-price="26.00">
  </div>
</div>

  <div class="item">
    <img src="imagens/refri.jpg">
    <div class="info">
      <span>Coca-Cola 350ml - R$ 6.00</span>
      <input type="number" min="0" value="0"
             data-name="Coca-Cola 350ml"
             data-price="5.00">
    </div>
  </div>
   <div class="item">
 <img src="imagens/refri2lt.jpg">
 <div class="info">
   <span>Refri 2 litros - R$ 15.00</span>
   <input type="number" min="0" value="0"
          data-name="Refri 2 litros"
          data-price="15.00">
 </div>
 </div>

  <textarea id="observacao" placeholder="Observações"></textarea>

  <div class="total">
    Total: R$ <span id="total">0.00</span>
  </div>

  <button onclick="enviarPedido()">Enviar Pedido</button>

</div>

<script src="script.js"></script>
</body>

</html>
